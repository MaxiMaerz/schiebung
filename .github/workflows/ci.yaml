name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Rust build and tests
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Cap'n Proto
        run: sudo apt-get update && sudo apt-get install -y capnproto
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose -- --test-threads=1
      - name: Run doctests
        run: cargo test --doc -p schiebung -p schiebung-rerun --verbose
      - name: Build rustdoc (deny warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        # Scoped to the published crates: a workspace-wide build collides on
        # duplicate `server` bin names between `comms` and `schiebung-server`.
        run: cargo doc -p schiebung -p schiebung-rerun --no-deps

  # Python tests for all packages
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - name: schiebung-core-py
            path: core/schiebung-core-py
          - name: schiebung-server-py
            path: server/schiebung-server-py
          - name: schiebung-rerun-py
            path: visualizer/schiebung-rerun-py
            # Built and installed alongside this package so its `schiebung`
            # dependency resolves to the sibling source, not the PyPI release.
            dep_path: core/schiebung-core-py
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Cap'n Proto
        run: sudo apt-get update && sudo apt-get install -y capnproto
      - name: Build dependency package
        if: ${{ matrix.package.dep_path }}
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -m ${{ matrix.package.dep_path }}/Cargo.toml
          sccache: true
          container: 'off'
      - name: Build ${{ matrix.package.name }}
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -m ${{ matrix.package.path }}/Cargo.toml
          sccache: true
          container: 'off'
      - name: Install and test
        working-directory: ${{ matrix.package.path }}
        run: |
          pip install pytest
          # Installs every wheel built above (the package plus any sibling deps),
          # so inter-package dependencies resolve locally instead of from PyPI.
          pip install ../../target/wheels/*.whl
          # Skip pytest when the package has no tests directory; otherwise
          # let pytest's exit code propagate so real failures fail CI.
          if [ -d tests ]; then
            pytest -v
          else
            echo "No tests/ directory in ${{ matrix.package.name }}, skipping."
          fi
